on:
  push:
    branches:
      - api-ci-test
      - dev

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'  
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install

    - name: npm run test
      run: |
        npm run test
